<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Stump Home Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #87CEEB; }
  svg { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90C4"/>
      <stop offset="40%" stop-color="#72B5E0"/>
      <stop offset="70%" stop-color="#A0D4F0"/>
      <stop offset="100%" stop-color="#C8E8F8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A35"/>
      <stop offset="30%" stop-color="#4A7A2E"/>
      <stop offset="100%" stop-color="#3B6324"/>
    </linearGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A2E1A"/>
      <stop offset="15%" stop-color="#5C3A22"/>
      <stop offset="35%" stop-color="#6B4226"/>
      <stop offset="50%" stop-color="#7A4E2E"/>
      <stop offset="65%" stop-color="#6B4226"/>
      <stop offset="85%" stop-color="#5C3A22"/>
      <stop offset="100%" stop-color="#4A2E1A"/>
    </linearGradient>
    <linearGradient id="barkDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D2515"/>
      <stop offset="50%" stop-color="#5A3820"/>
      <stop offset="100%" stop-color="#3D2515"/>
    </linearGradient>
    <radialGradient id="topWood" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A85C"/>
      <stop offset="40%" stop-color="#C89B50"/>
      <stop offset="80%" stop-color="#B08040"/>
      <stop offset="100%" stop-color="#8B6530"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5CAD3A"/>
      <stop offset="100%" stop-color="#3D8B20"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6BC04A"/>
      <stop offset="100%" stop-color="#4A9E30"/>
    </linearGradient>
    <linearGradient id="leafC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78D050"/>
      <stop offset="100%" stop-color="#50A830"/>
    </linearGradient>
    <linearGradient id="leafD" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ADA60"/>
      <stop offset="100%" stop-color="#5CB840"/>
    </linearGradient>
    <!-- Background trees -->
    <linearGradient id="treeTrunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A3020"/>
      <stop offset="50%" stop-color="#5C3E28"/>
      <stop offset="100%" stop-color="#3E2818"/>
    </linearGradient>
    <radialGradient id="foliageA" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#4A9030"/>
      <stop offset="60%" stop-color="#3A7825"/>
      <stop offset="100%" stop-color="#2D601C"/>
    </radialGradient>
    <radialGradient id="foliageB" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#508E35"/>
      <stop offset="60%" stop-color="#3E7A28"/>
      <stop offset="100%" stop-color="#2C5C1A"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000035"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <filter id="treeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Clouds -->
  <g opacity="0.65">
    <ellipse cx="250" cy="130" rx="130" ry="50" fill="white"/>
    <ellipse cx="340" cy="110" rx="95" ry="48" fill="white"/>
    <ellipse cx="190" cy="120" rx="80" ry="38" fill="white"/>

    <ellipse cx="900" cy="170" rx="150" ry="55" fill="white"/>
    <ellipse cx="1010" cy="150" rx="110" ry="50" fill="white"/>
    <ellipse cx="820" cy="160" rx="90" ry="42" fill="white"/>

    <ellipse cx="550" cy="80" rx="110" ry="42" fill="white"/>
    <ellipse cx="620" cy="65" rx="75" ry="36" fill="white"/>

    <ellipse cx="1600" cy="100" rx="80" ry="30" fill="white" opacity="0.5"/>
  </g>

  <!-- Distant hills -->
  <path d="M0,520 Q200,440 400,480 Q600,430 800,460 Q1000,410 1200,450 Q1400,420 1600,460 Q1800,430 1920,470 L1920,620 L0,620Z" fill="#6A9E48" opacity="0.4"/>
  <path d="M0,540 Q300,490 500,510 Q700,480 960,500 Q1200,470 1400,500 Q1650,480 1920,510 L1920,620 L0,620Z" fill="#5A8E3A" opacity="0.5"/>

  <!-- Background trees -->
  <g filter="url(#treeShadow)" opacity="0.7">
    <!-- Far left tree -->
    <rect x="120" y="380" width="30" height="200" fill="url(#treeTrunk)"/>
    <ellipse cx="135" cy="340" rx="70" ry="90" fill="url(#foliageA)"/>
    <ellipse cx="115" cy="360" rx="50" ry="65" fill="#3E7A28" opacity="0.6"/>

    <!-- Left-center tree -->
    <rect x="350" y="400" width="26" height="180" fill="url(#treeTrunk)"/>
    <ellipse cx="363" cy="360" rx="60" ry="80" fill="url(#foliageB)"/>
    <ellipse cx="380" cy="375" rx="45" ry="55" fill="#357020" opacity="0.5"/>

    <!-- Center tree -->
    <rect x="680" y="390" width="28" height="190" fill="url(#treeTrunk)"/>
    <ellipse cx="694" cy="345" rx="65" ry="85" fill="url(#foliageA)"/>
    <ellipse cx="710" cy="365" rx="48" ry="60" fill="#3A7525" opacity="0.5"/>

    <!-- Right-center tree (behind stump area) -->
    <rect x="1100" y="370" width="32" height="210" fill="url(#treeTrunk)"/>
    <ellipse cx="1116" cy="325" rx="75" ry="95" fill="url(#foliageB)"/>
    <ellipse cx="1095" cy="345" rx="55" ry="70" fill="#357020" opacity="0.6"/>

    <!-- Extra background trees -->
    <rect x="240" y="410" width="22" height="170" fill="#4A3525" opacity="0.5"/>
    <ellipse cx="251" cy="380" rx="50" ry="65" fill="#3A7525" opacity="0.45"/>

    <rect x="520" y="405" width="24" height="175" fill="#4A3525" opacity="0.5"/>
    <ellipse cx="532" cy="370" rx="55" ry="70" fill="#3E7A28" opacity="0.45"/>

    <!-- Far right background tree -->
    <rect x="1750" y="395" width="26" height="185" fill="url(#treeTrunk)"/>
    <ellipse cx="1763" cy="355" rx="60" ry="78" fill="url(#foliageA)"/>
    <ellipse cx="1745" cy="370" rx="44" ry="56" fill="#3A7525" opacity="0.5"/>
  </g>

  <!-- Ground plane -->
  <path d="M0,580 Q480,560 960,570 Q1440,560 1920,580 L1920,1080 L0,1080Z" fill="url(#ground)"/>

  <!-- Ground texture - dirt patches -->
  <ellipse cx="200" cy="700" rx="90" ry="25" fill="#6B5230" opacity="0.12"/>
  <ellipse cx="700" cy="750" rx="80" ry="22" fill="#6B5230" opacity="0.1"/>
  <ellipse cx="400" cy="850" rx="120" ry="30" fill="#6B5230" opacity="0.08"/>
  <ellipse cx="100" cy="950" rx="100" ry="20" fill="#6B5230" opacity="0.1"/>
  <ellipse cx="1700" cy="920" rx="90" ry="18" fill="#6B5230" opacity="0.09"/>
  <ellipse cx="550" cy="650" rx="70" ry="18" fill="#6B5230" opacity="0.1"/>

  <!-- Ground grass texture -->
  <g stroke="#3D7520" stroke-width="1.5" fill="none" opacity="0.25">
    <path d="M100,620 Q103,608 106,620"/><path d="M250,640 Q253,628 256,640"/>
    <path d="M400,625 Q403,612 406,625"/><path d="M550,635 Q553,622 556,635"/>
    <path d="M700,620 Q703,608 706,620"/><path d="M850,630 Q853,618 856,630"/>
    <path d="M1050,625 Q1053,612 1056,625"/><path d="M1200,635 Q1203,622 1206,635"/>
    <path d="M1350,620 Q1353,608 1356,620"/><path d="M1500,630 Q1503,618 1506,630"/>
    <path d="M1650,625 Q1653,612 1656,625"/><path d="M1800,635 Q1803,622 1806,635"/>
    <path d="M200,700 Q203,688 206,700"/><path d="M600,710 Q603,698 606,710"/>
    <path d="M1300,700 Q1303,688 1306,700"/><path d="M1700,710 Q1703,698 1706,710"/>
    <path d="M150,800 Q153,788 156,800"/><path d="M450,790 Q453,778 456,790"/>
    <path d="M1450,800 Q1453,788 1456,800"/><path d="M1780,790 Q1783,778 1786,790"/>
  </g>

  <!-- === STUMP SHADOW on ground === -->
  <ellipse cx="1380" cy="740" rx="260" ry="50" fill="#1a1a1a" opacity="0.18"/>

  <!-- === TREE STUMP (shifted to the right, centered ~x=1360) === -->
  <g filter="url(#shadow)">
    <!-- Roots spreading on ground -->
    <path d="M1120,730 Q1070,740 1030,760 Q1060,745 1100,735Z" fill="#5C3A22"/>
    <path d="M1140,740 Q1080,755 1040,780 Q1070,760 1120,745Z" fill="#4A2E1A"/>
    <path d="M1150,735 Q1110,750 1080,770 Q1100,755 1140,740Z" fill="#3D2515" opacity="0.6"/>

    <path d="M1600,730 Q1650,740 1690,760 Q1660,745 1620,735Z" fill="#5C3A22"/>
    <path d="M1580,740 Q1640,755 1680,780 Q1650,760 1600,745Z" fill="#4A2E1A"/>
    <path d="M1570,735 Q1610,750 1640,770 Q1620,755 1580,740Z" fill="#3D2515" opacity="0.6"/>

    <!-- Front root bumps -->
    <ellipse cx="1200" cy="735" rx="40" ry="12" fill="#5C3A22"/>
    <ellipse cx="1520" cy="735" rx="35" ry="10" fill="#5C3A22"/>
    <ellipse cx="1360" cy="742" rx="50" ry="14" fill="#4A2E1A"/>

    <!-- Main trunk body -->
    <path d="M1160,510
             Q1155,560 1150,620
             Q1145,680 1148,730
             Q1250,750 1360,752
             Q1470,750 1572,730
             Q1575,680 1570,620
             Q1565,560 1560,510
             Z"
          fill="url(#bark)"/>

    <!-- Bark vertical texture -->
    <g stroke="#3D2515" stroke-width="1.8" opacity="0.3" fill="none">
      <path d="M1200,520 Q1205,600 1200,680 Q1198,720 1202,745"/>
      <path d="M1260,515 Q1258,590 1262,670 Q1265,710 1260,748"/>
      <path d="M1320,512 Q1322,600 1318,680 Q1320,720 1322,750"/>
      <path d="M1380,512 Q1378,590 1382,670 Q1380,715 1378,750"/>
      <path d="M1440,514 Q1442,600 1438,680 Q1440,718 1442,748"/>
      <path d="M1500,518 Q1498,595 1502,675 Q1500,715 1498,742"/>
    </g>

    <!-- Bark horizontal crevices -->
    <g stroke="#3D2515" stroke-width="1.2" opacity="0.2" fill="none">
      <path d="M1170,560 Q1260,555 1360,558 Q1460,555 1555,560"/>
      <path d="M1155,620 Q1250,615 1360,618 Q1470,615 1565,620"/>
      <path d="M1150,680 Q1250,675 1360,678 Q1470,675 1570,680"/>
    </g>

    <!-- Bark knots -->
    <ellipse cx="1280" cy="630" rx="18" ry="25" fill="#3D2515" opacity="0.45"/>
    <ellipse cx="1280" cy="630" rx="10" ry="15" fill="#2A1A0E" opacity="0.35"/>
    <ellipse cx="1460" cy="570" rx="14" ry="20" fill="#3D2515" opacity="0.4"/>
    <ellipse cx="1460" cy="570" rx="8" ry="12" fill="#2A1A0E" opacity="0.3"/>

    <!-- Bark highlights (light catching edges) -->
    <path d="M1170,520 Q1168,600 1165,680 Q1163,720 1166,740" stroke="#8B6040" stroke-width="1.5" fill="none" opacity="0.2"/>
    <path d="M1552,520 Q1555,600 1558,680 Q1560,720 1557,740" stroke="#8B6040" stroke-width="1.5" fill="none" opacity="0.2"/>

    <!-- === CUT TOP SURFACE === -->
    <ellipse cx="1360" cy="510" rx="205" ry="55" fill="url(#topWood)"/>

    <!-- Tree rings on top -->
    <g fill="none" stroke-width="1.8" opacity="0.35">
      <ellipse cx="1360" cy="510" rx="8" ry="4" stroke="#8B6530"/>
      <ellipse cx="1359" cy="509" rx="25" ry="10" stroke="#A07034"/>
      <ellipse cx="1361" cy="511" rx="48" ry="16" stroke="#B08040"/>
      <ellipse cx="1359" cy="509" rx="72" ry="22" stroke="#A07034"/>
      <ellipse cx="1361" cy="511" rx="96" ry="28" stroke="#B58845"/>
      <ellipse cx="1359" cy="509" rx="120" ry="34" stroke="#A07034"/>
      <ellipse cx="1361" cy="511" rx="145" ry="40" stroke="#B08040"/>
      <ellipse cx="1359" cy="509" rx="168" ry="45" stroke="#A57838"/>
      <ellipse cx="1361" cy="510" rx="190" ry="50" stroke="#9A6E30"/>
    </g>

    <!-- Thicker accent rings -->
    <g fill="none" stroke-width="2.5" opacity="0.18">
      <ellipse cx="1360" cy="510" rx="72" ry="22" stroke="#8B6530"/>
      <ellipse cx="1360" cy="510" rx="145" ry="40" stroke="#8B6530"/>
    </g>

    <!-- Center pith -->
    <ellipse cx="1360" cy="510" rx="4" ry="2.5" fill="#7A5A28" opacity="0.6"/>

    <!-- Cracks on cut surface -->
    <g stroke="#8B6B3D" stroke-width="1.5" fill="none" opacity="0.45">
      <path d="M1360,510 Q1345,495 1330,480"/>
      <path d="M1360,510 Q1390,500 1430,490"/>
      <path d="M1360,510 Q1350,525 1335,535"/>
      <path d="M1360,510 Q1385,520 1410,530"/>
      <path d="M1360,510 Q1360,498 1358,485"/>
    </g>

    <!-- Rim edge highlight -->
    <ellipse cx="1360" cy="510" rx="205" ry="55" fill="none" stroke="#8B7040" stroke-width="2" opacity="0.3"/>

    <!-- Bark rim on top edge -->
    <path d="M1155,510 Q1155,500 1160,495 Q1260,460 1360,455 Q1460,460 1560,495 Q1565,500 1565,510"
          fill="none" stroke="#5C3A22" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- === GRASS TUFTS around the stump === -->
  <!-- Foreground grass (in front of stump) -->
  <g fill="#4CAF30">
    <path d="M1220,760 Q1215,720 1210,760 Q1205,700 1200,760 Q1195,730 1190,760Z"/>
    <path d="M1320,770 Q1317,730 1314,770 Q1309,710 1304,770Z"/>
    <path d="M1420,765 Q1425,725 1430,765 Q1435,705 1440,765 Q1445,735 1450,765Z"/>
    <path d="M1530,758 Q1535,720 1540,758 Q1545,700 1550,758Z"/>
  </g>
  <g fill="#3D9E25">
    <path d="M1260,765 Q1255,728 1250,765 Q1245,710 1240,765Z"/>
    <path d="M1370,772 Q1375,732 1380,772 Q1385,715 1390,772Z"/>
    <path d="M1480,762 Q1475,725 1470,762 Q1465,708 1460,762Z"/>
  </g>
  <g fill="#5CB840">
    <path d="M1150,755 Q1145,720 1140,755 Q1135,700 1130,755Z"/>
    <path d="M1570,755 Q1575,720 1580,755 Q1585,700 1590,755Z"/>
  </g>

  <!-- Side grass near stump -->
  <g fill="#4CAF30">
    <path d="M1050,720 Q1045,680 1040,720 Q1035,660 1030,720 Q1025,690 1020,720Z"/>
    <path d="M980,710 Q975,675 970,710 Q965,658 960,710Z"/>
    <path d="M1670,720 Q1675,680 1680,720 Q1685,660 1690,720 Q1695,690 1700,720Z"/>
    <path d="M1740,710 Q1745,675 1750,710 Q1755,658 1760,710Z"/>
  </g>

  <!-- Far left foreground grass -->
  <g fill="#5CB840">
    <path d="M100,600 Q95,560 90,600 Q85,540 80,600 Q75,570 70,600Z"/>
    <path d="M200,610 Q197,575 194,610 Q189,555 184,610Z"/>
    <path d="M320,605 Q325,565 330,605 Q335,548 340,605Z"/>
    <path d="M500,600 Q505,560 510,600 Q515,545 520,600Z"/>
    <path d="M650,605 Q655,565 660,605 Q665,548 670,605Z"/>
    <path d="M800,600 Q805,560 810,600 Q815,545 820,600Z"/>
    <path d="M1830,600 Q1835,560 1840,600 Q1845,540 1850,600Z"/>
  </g>
  <g fill="#4CAF30">
    <path d="M50,610 Q45,575 40,610 Q35,555 30,610Z"/>
    <path d="M450,600 Q445,560 440,600 Q435,545 430,600Z"/>
    <path d="M750,605 Q745,568 740,605 Q735,550 730,605Z"/>
    <path d="M900,600 Q895,560 890,600 Q885,548 880,600Z"/>
    <path d="M1900,610 Q1895,575 1890,610Z"/>
  </g>

  <!-- Big foreground grass -->
  <g fill="#3D9E25">
    <path d="M50,1000 Q40,920 30,1000 Q20,880 10,1000Z"/>
    <path d="M150,980 Q145,910 140,980 Q130,870 120,980 Q115,930 110,980Z"/>
    <path d="M350,990 Q345,920 340,990 Q330,880 320,990Z"/>
    <path d="M1800,990 Q1810,910 1820,990 Q1830,880 1840,990Z"/>
    <path d="M1890,1000 Q1895,930 1900,1000 Q1910,890 1920,1000Z"/>
  </g>
  <g fill="#4CAF30">
    <path d="M250,1020 Q245,960 240,1020 Q230,930 220,1020Z"/>
    <path d="M500,1010 Q505,950 510,1010 Q515,930 520,1010Z"/>
    <path d="M1680,1010 Q1690,940 1700,1010 Q1710,920 1720,1010Z"/>
  </g>

  <!-- === SCATTERED LEAVES === -->
  <g filter="url(#softShadow)">
    <!-- Ground leaves near stump -->
    <g transform="translate(1080,730) rotate(40)">
      <path d="M0,0 Q16,-32 0,-56 Q-16,-32 0,0Z" fill="url(#leafA)"/>
      <line x1="0" y1="0" x2="0" y2="-52" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(1640,725) rotate(-30)">
      <path d="M0,0 Q14,-28 0,-50 Q-14,-28 0,0Z" fill="url(#leafB)"/>
      <line x1="0" y1="0" x2="0" y2="-46" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(1300,780) rotate(70)">
      <path d="M0,0 Q12,-24 0,-42 Q-12,-24 0,0Z" fill="url(#leafC)"/>
      <line x1="0" y1="0" x2="0" y2="-38" stroke="#2D6B15" stroke-width="1.2"/>
    </g>
    <g transform="translate(1450,775) rotate(-55)">
      <path d="M0,0 Q12,-24 0,-42 Q-12,-24 0,0Z" fill="url(#leafD)"/>
      <line x1="0" y1="0" x2="0" y2="-38" stroke="#2D6B15" stroke-width="1.2"/>
    </g>

    <!-- Floating / falling leaves in air -->
    <g transform="translate(300,380) rotate(55)" opacity="0.75">
      <path d="M0,0 Q14,-28 0,-48 Q-14,-28 0,0Z" fill="#6BC04A"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#2D6B15" stroke-width="1"/>
    </g>
    <g transform="translate(700,320) rotate(-40)" opacity="0.7">
      <path d="M0,0 Q12,-24 0,-42 Q-12,-24 0,0Z" fill="#5CAD3A"/>
      <line x1="0" y1="0" x2="0" y2="-38" stroke="#2D6B15" stroke-width="1"/>
    </g>
    <g transform="translate(500,280) rotate(25)" opacity="0.6">
      <path d="M0,0 Q10,-20 0,-36 Q-10,-20 0,0Z" fill="#78D050"/>
      <line x1="0" y1="0" x2="0" y2="-32" stroke="#2D6B15" stroke-width="1"/>
    </g>
    <g transform="translate(1100,420) rotate(-70)" opacity="0.65">
      <path d="M0,0 Q10,-20 0,-36 Q-10,-20 0,0Z" fill="#8ADA60"/>
      <line x1="0" y1="0" x2="0" y2="-32" stroke="#2D6B15" stroke-width="1"/>
    </g>

    <!-- Far scattered leaves on left open area -->
    <g transform="translate(150,650) rotate(60)" opacity="0.7">
      <path d="M0,0 Q16,-32 0,-56 Q-16,-32 0,0Z" fill="url(#leafA)"/>
      <line x1="0" y1="0" x2="0" y2="-52" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(600,680) rotate(-45)" opacity="0.7">
      <path d="M0,0 Q16,-32 0,-56 Q-16,-32 0,0Z" fill="url(#leafB)"/>
      <line x1="0" y1="0" x2="0" y2="-52" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(350,800) rotate(15)" opacity="0.65">
      <path d="M0,0 Q14,-28 0,-50 Q-14,-28 0,0Z" fill="url(#leafC)"/>
      <line x1="0" y1="0" x2="0" y2="-46" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(800,820) rotate(-20)" opacity="0.65">
      <path d="M0,0 Q14,-28 0,-50 Q-14,-28 0,0Z" fill="url(#leafD)"/>
      <line x1="0" y1="0" x2="0" y2="-46" stroke="#2D6B15" stroke-width="1.3"/>
    </g>
    <g transform="translate(1800,650) rotate(35)" opacity="0.6">
      <path d="M0,0 Q14,-28 0,-50 Q-14,-28 0,0Z" fill="url(#leafA)"/>
      <line x1="0" y1="0" x2="0" y2="-46" stroke="#2D6B15" stroke-width="1.3"/>
    </g>

    <!-- A leaf on the stump top -->
    <g transform="translate(1330,500) rotate(35)" opacity="0.6">
      <path d="M0,0 Q10,-20 0,-34 Q-10,-20 0,0Z" fill="#5CAD3A"/>
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#2D6B15" stroke-width="1"/>
    </g>
  </g>

  <!-- Small flowers -->
